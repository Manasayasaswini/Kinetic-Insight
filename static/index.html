<!DOCTYPE html>
<html>
<head>
    <title>Optics Lab - Stone 1</title>
    <style>
body { 
    margin: 0; 
    background: #0a0a0c;
    color: #e0e0e0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden; 
}
canvas { display: block; }

.ui-panel {
    position: absolute;
    top: 30px;
    left: 30px;
    background: rgba(255, 255, 255, 0.05);
    padding: 20px;
    border-radius: 12px;
    backdrop-filter: blur(10px); /* Makes it look modern */
    border: 1px solid rgba(255, 255, 255, 0.1);
    pointer-events: auto;
    width: 250px;
}

h1 { font-size: 1.2rem; margin: 0 0 10px 0; color: #00f2ff; text-transform: uppercase; letter-spacing: 1px; }
p { font-size: 0.9rem; margin-bottom: 15px; opacity: 0.8; }

select {
    width: 100%;
    padding: 10px;
    background: #1a1a1d;
    color: white;
    border: 1px solid #333;
    border-radius: 4px;
    cursor: pointer;
}
</style>
</head>
<body>
    <div class="ui">
        <h1>Optics Lab: Stone 1</h1>
        <p>Move your mouse to aim the laser.</p>
        <label for="material">Choose Medium:</label>
        <select id="material">
            <option value="1.33">Water (n=1.33)</option>
            <option value="1.5">Glass (n=1.5)</option>
            <option value="1.42">Oil (n=1.42)</option>
            <option value="2.42">Diamond (n=2.42)</option>
        </select>
    </div>
    <canvas id="canvas"></canvas>
    <script src="script.js"></script>
</body>
</html>
