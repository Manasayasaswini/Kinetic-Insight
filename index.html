<!DOCTYPE html>
<html>
<head>
    <title>Optics Lab - Stone 1</title>
    <style>
        body { margin: 0; background: #121212; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; cursor: crosshair; }
        .ui { position: absolute; top: 20px; left: 20px; }
        select { padding: 5px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="ui">
        <h1>Optics Lab: Stone 1</h1>
        <p>Move your mouse to aim the laser.</p>
        <label for="material">Choose Medium:</label>
        <select id="material">
            <option value="1.33">Water (n=1.33)</option>
            <option value="1.5">Glass (n=1.5)</option>
            <option value="1.42">Oil (n=1.42)</option>
            <option value="2.42">Diamond (n=2.42)</option>
        </select>
    </div>
    <canvas id="canvas"></canvas>
    <script src="script.js"></script>
</body>
</html>
